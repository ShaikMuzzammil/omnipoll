version: '3.9'

services:
  # ─── PostgreSQL ─────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: omnipoll_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: omnipoll
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Redis ──────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: omnipoll_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Backend (optional — use pnpm dev for hot reload) ───────────
  # server:
  #   build:
  #     context: ./apps/server
  #     dockerfile: Dockerfile
  #   container_name: omnipoll_server
  #   restart: unless-stopped
  #   ports:
  #     - "3001:3001"
  #   environment:
  #     DATABASE_URL: postgresql://postgres:postgres@postgres:5432/omnipoll
  #     REDIS_URL: redis://redis:6379
  #     NODE_ENV: production
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: omnipoll_network
