## render.yaml — Deploy OmniPoll backend to Render
## Docs: https://render.com/docs/render-yaml

services:
  # ── Backend API + Socket.IO ─────────────────────────
  - type: web
    name: omnipoll-api
    runtime: node
    region: oregon
    plan: free             # Change to "starter" for production
    rootDir: apps/server
    buildCommand: npm install -g pnpm && pnpm install && pnpm build
    startCommand: node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: omnipoll-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: omnipoll-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true        # Render auto-generates a secure random value
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: FRONTEND_URL
        value: https://your-app.vercel.app  # ← update after Vercel deploy

  # ── PostgreSQL Database ─────────────────────────────
databases:
  - name: omnipoll-db
    databaseName: omnipoll
    user: omnipoll
    plan: free             # Change to "starter" ($7/mo) for production

  # ── Redis Cache ─────────────────────────────────────
  - type: redis
    name: omnipoll-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
